<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexion - L'hams DJ ERP</title>
  <meta name="theme-color" content="#03080f" />
  <style>
    @font-face {
      font-family: 'Syne';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: local('Syne Bold'), local('Syne');
    }
    @font-face {
      font-family: 'DM Sans';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: local('DM Sans'), local('DM Sans Regular');
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #03080f;
      color: #e2eaf5;
      font-family: 'DM Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
    }

    .container {
      max-width: 420px;
      width: 100%;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.5rem;
      opacity: 0.5;
    }

    .icon svg {
      width: 100%;
      height: 100%;
    }

    h1 {
      font-family: 'Syne', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #8a9bb5;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: #0ea5e9;
      color: #03080f;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 0.9375rem;
      font-weight: 600;
      padding: 0.75rem 1.75rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }

    .btn:hover {
      background-color: #38bdf8;
    }

    .btn:active {
      background-color: #0284c7;
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    .note {
      margin-top: 2.5rem;
      font-size: 0.8125rem;
      color: #4a5a73;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949
          3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
    </div>

    <h1>Sin conexion</h1>
    <p>No se pudo conectar al servidor. Verifica tu conexion a internet e intenta de nuevo.</p>

    <button class="btn" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993
          0 1.052-8.65 4.879-4.879a8.25 8.25 0 0 1 12.694 1.01M21.015
          4.356v4.992m0 0h-4.992m4.993 0-1.052 8.65-4.879 4.879a8.25
          8.25 0 0 1-12.694-1.01" />
      </svg>
      Reintentar
    </button>

    <p class="note">Si estabas en el punto de venta, tus transacciones pendientes se enviaran automaticamente al restaurar la conexion.</p>
  </div>
</body>
</html>
